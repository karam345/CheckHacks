<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckHacks | Editor</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
          --blue:#4493f8;--blue-dim:#1f3a5c;--text:#e6edf3;--text2:#8b949e;
          --green:#3fb950;--red:#f85149;--yellow:#d29922;--gray:#484f58;
          --radius:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif
        }
        body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:16px;flex-shrink:0}
        .logo{font-weight:700;font-size:16px;color:var(--text)}
        .logo span{color:var(--blue)}
        .header-spacer{flex:1}
        .home-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:var(--font);transition:all .15s}
        .home-btn:hover{border-color:var(--blue);color:var(--text)}
        .player-badge{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;margin-left:8px}
        .player-badge img{border-radius:4px;image-rendering:pixelated;width:24px;height:24px}
        .layout{display:grid;grid-template-columns:240px 1fr 260px;flex:1;overflow:hidden}
        .panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
        .panel-right{border-right:none;border-left:1px solid var(--border)}
        .panel-title{padding:12px 16px 10px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);flex-shrink:0}
        .search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
        .search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:7px 10px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
        .search-wrap input:focus{border-color:var(--blue)}
        .search-wrap input::placeholder{color:var(--text2)}
        .search-wrap button{width:100%;margin-top:6px;background:var(--blue-dim);border:1px solid var(--blue);color:var(--blue);border-radius:var(--radius);padding:7px;cursor:pointer;font-size:13px;font-family:var(--font);transition:all .15s}
        .search-wrap button:hover{background:var(--blue);color:#fff}
        .panel-scroll{flex:1;overflow-y:auto;padding:6px}
        .panel-scroll::-webkit-scrollbar{width:4px}
        .panel-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .player-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;transition:background .12s;border:1px solid transparent}
        .player-item:hover{background:var(--surface2);border-color:var(--border)}
        .player-item img{border-radius:3px;image-rendering:pixelated;flex-shrink:0;width:28px;height:28px;background:var(--surface2)}
        .player-item-name{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
        .scan-item{padding:9px 10px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);margin-bottom:5px;background:var(--bg);transition:border-color .12s}
        .scan-item:hover{border-color:var(--blue)}
        .scan-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
        .scan-item-name{font-weight:600;font-size:12px;color:var(--text)}
        .scan-item-time{font-size:11px;color:var(--text2)}
        .scan-item-meta{font-size:11px;color:var(--text2)}
        main{overflow-y:auto;padding:20px;background:var(--bg)}
        main::-webkit-scrollbar{width:5px}
        main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
        .stat-card-num{font-size:26px;font-weight:700;color:var(--text);line-height:1}
        .stat-card-label{font-size:11px;color:var(--text2);margin-top:3px}
        .section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
        .player-header{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
        .player-header img{border-radius:6px;image-rendering:pixelated;width:64px;height:64px;background:var(--surface2)}
        .player-header-info h2{font-size:20px;font-weight:700;color:var(--text)}
        .player-header-info p{font-size:11px;color:var(--text2);margin-top:2px;font-family:monospace}
        .online-badge{display:inline-flex;align-items:center;gap:4px;background:#1a2e1a;border:1px solid #2d5a2d;color:var(--green);border-radius:20px;padding:2px 9px;font-size:11px;margin-top:5px}
        .offline-badge{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:20px;padding:2px 9px;font-size:11px;margin-top:5px}
        .scan-cards{display:flex;flex-direction:column;gap:8px}
        .scan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s}
        .scan-card:hover{border-color:var(--blue)}
        .scan-card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .scan-card-meta{font-size:11px;color:var(--text2);padding:6px 14px;border-bottom:1px solid var(--border)}
        .scan-card-type{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--blue)}
        .scan-card-time{font-size:11px;color:var(--text2)}
        .results-table{width:100%;border-collapse:collapse}
        .results-table th{text-align:left;padding:8px 14px;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
        .results-table td{padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px}
        .results-table tr:last-child td{border-bottom:none}
        .badge{display:inline-flex;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
        .badge-DETECTED{background:#3d1a1a;border:1px solid #7c2020;color:var(--red)}
        .badge-NOT_DETECTED{background:#1a2e1a;border:1px solid #2d5a2d;color:var(--green)}
        .badge-PROTECTED{background:#2e2410;border:1px solid #5a3d10;color:var(--yellow)}
        .badge-SKIPPED{background:var(--surface2);border:1px solid var(--border);color:var(--gray)}
        .badge-lang{background:var(--blue-dim);border:1px solid var(--blue);color:var(--blue)}
        .empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
        .loading{text-align:center;padding:28px;color:var(--text2);font-size:13px}
        .back-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);padding:6px 12px;cursor:pointer;font-size:13px;font-family:var(--font);margin-bottom:14px;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
        .back-btn:hover{border-color:var(--blue);color:var(--text)}
        .run-btn{background:var(--blue-dim);border:1px solid var(--blue);color:var(--blue);border-radius:var(--radius);padding:7px 14px;cursor:pointer;font-size:13px;font-family:var(--font);transition:all .15s;margin-bottom:14px;margin-right:8px}
        .run-btn:hover{background:var(--blue);color:#fff}
        .run-btn:disabled{opacity:.4;cursor:not-allowed}
        .toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
        .toast.show{opacity:1}
        .error-msg{color:var(--red);font-size:12px;padding:8px 0}
    </style>
</head>
<body>
<header>
    <span class="logo">Check<span>Hacks</span> Editor</span>
    <div class="header-spacer"></div>
    <div class="player-badge" id="player-badge"></div>
    <button class="home-btn" onclick="showHome()">⌂ Home</button>
</header>
<div class="layout">
    <aside class="panel">
        <div class="panel-title">Players</div>
        <div class="search-wrap">
            <input type="text" id="search-input" placeholder="Search player..." onkeydown="if(event.key==='Enter')searchPlayer()">
            <button onclick="searchPlayer()">Search</button>
        </div>
        <div class="panel-scroll" id="offline-history"></div>
    </aside>
    <main id="main-content">
        <div class="loading">Loading...</div>
    </main>
    <aside class="panel panel-right">
        <div class="panel-title">Recent Scans</div>
        <div class="panel-scroll" id="recent-scans"></div>
        <div class="panel-title" style="border-top:1px solid var(--border)">Online Players</div>
        <div style="height:220px;overflow-y:auto;padding:6px;flex-shrink:0" id="online-players"></div>
    </aside>
</div>
<div class="toast" id="toast"></div>
<script>
    const token = new URLSearchParams(location.search).get('token');

    function apiUrl(path) {
      const sep = path.includes('?') ? '&' : '?';
      return '/api/' + path + sep + 'token=' + encodeURIComponent(token);
    }

    async function apiFetch(path, opts) {
      const r = await fetch(apiUrl(path), opts || {});
      const text = await r.text();
      let json;
      try { json = JSON.parse(text); } catch(e) { throw new Error('Invalid JSON: ' + text.slice(0,100)); }
      if (!r.ok) throw new Error(json.error || r.status);
      return json;
    }

    async function apiPost(path, body) {
      return apiFetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    let offlineHistory = [];
    try { offlineHistory = JSON.parse(localStorage.getItem('ch_history') || '[]'); } catch(e) {}

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(ts) {
      const d = Date.now() - Number(ts);
      if (d < 60000) return 'just now';
      if (d < 3600000) return Math.floor(d/60000) + 'm ago';
      if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
      return new Date(Number(ts)).toLocaleDateString();
    }

    function headUrl(id) {
      return 'https://mc-heads.net/avatar/' + encodeURIComponent(id) + '/32';
    }

    function badge(result) {
      const r = String(result || 'SKIPPED').toUpperCase();
      return '<span class="badge badge-' + r + '">' + r + '</span>';
    }

    async function init() {
      try {
        const info = await apiFetch('validate');
        document.getElementById('player-badge').innerHTML =
          '<img src="' + headUrl(info.player_uuid) + '" onerror="this.style.visibility=\'hidden\'" alt=""> ' + esc(info.player_name);
      } catch(e) {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8b949e;font-size:14px">Session expired. Run /cheditor in Minecraft.</div>';
        return;
      }
      showHome();
      loadOnlinePlayers();
      loadRecentScans();
      renderOfflineHistory();
      setInterval(loadOnlinePlayers, 10000);
      setInterval(loadRecentScans, 15000);
    }

    async function showHome() {
      const main = document.getElementById('main-content');
      main.innerHTML = '<div class="loading">Loading...</div>';
      try {
        const [hackScans, langScans] = await Promise.all([
          apiFetch('scans?type=hack&limit=200'),
          apiFetch('scans?type=lang&limit=200')
        ]);
        const detected = hackScans.filter(s => s.has_detected == 1 || s.has_detected === true).length;
        const recent = [...hackScans, ...langScans].sort((a,b) => Number(b.timestamp) - Number(a.timestamp)).slice(0, 15);

        let cards = '';
        for (const s of recent) {
          cards += buildScanCard(s);
        }

        main.innerHTML =
          '<div class="section-title">Overview</div>' +
          '<div class="stat-row">' +
            '<div class="stat-card"><div class="stat-card-num">' + hackScans.length + '</div><div class="stat-card-label">Hack Scans</div></div>' +
            '<div class="stat-card"><div class="stat-card-num">' + langScans.length + '</div><div class="stat-card-label">Lang Checks</div></div>' +
            '<div class="stat-card"><div class="stat-card-num" style="color:var(--red)">' + detected + '</div><div class="stat-card-label">Detections</div></div>' +
          '</div>' +
          '<div class="section-title">Recent Activity</div>' +
          '<div class="scan-cards">' + (cards || '<div class="empty-state"><p>No scans yet.</p></div>') + '</div>';
      } catch(e) {
        main.innerHTML = '<div class="empty-state"><p>Error: ' + esc(e.message) + '</p></div>';
      }
    }

    function buildScanCard(s) {
      const results = s.results || [];
      let preview = '';
      if (s.type === 'hack') {
        preview = results.slice(0, 6).map(r => badge(r.result)).join(' ');
      } else {
        const r = results[0];
        preview = r ? '<span class="badge badge-lang">' + esc(r.language || 'Unknown') + '</span>' : '';
      }
      return '<div class="scan-card" onclick="showScan(' + s.id + ')">' +
        '<div class="scan-card-header">' +
          '<span class="scan-card-type">' + (s.type === 'hack' ? 'Hack Check' : 'Lang Check') + ' — ' + esc(s.target_name) + '</span>' +
          '<span class="scan-card-time">' + timeAgo(s.timestamp) + '</span>' +
        '</div>' +
        '<div class="scan-card-meta">by ' + esc(s.checker_name) + ' &nbsp;·&nbsp; ' + new Date(Number(s.timestamp)).toLocaleString() + '</div>' +
        (preview ? '<div style="padding:8px 14px;display:flex;flex-wrap:wrap;gap:4px">' + preview + '</div>' : '') +
      '</div>';
    }

    async function showScan(id) {
      const main = document.getElementById('main-content');
      main.innerHTML = '<div class="loading">Loading scan #' + id + '...</div>';
      try {
        const scan = await apiFetch('scan/' + id);
        const results = scan.results || [];

        let body = '';
        if (scan.type === 'hack') {
          if (results.length === 0) {
            body = '<div class="empty-state"><p>No results saved for this scan.</p></div>';
          } else {
            let rows = '';
            for (const r of results) {
              rows += '<tr><td>' + esc(r.hack_name) + '</td><td>' + badge(r.result) + '</td></tr>';
            }
            body = '<table class="results-table"><thead><tr><th>Mod</th><th>Result</th></tr></thead><tbody>' + rows + '</tbody></table>';
          }
        } else {
          const r = results[0];
          if (r) {
            body = '<table class="results-table"><thead><tr><th>Language</th><th>Raw Response</th></tr></thead><tbody>' +
              '<tr><td><span class="badge badge-lang">' + esc(r.language || 'Unknown') + '</span></td><td>' + esc(r.response || '') + '</td></tr>' +
              '</tbody></table>';
          } else {
            body = '<div class="empty-state"><p>No results saved for this scan.</p></div>';
          }
        }

        const backTarget = scan.target_name;
        main.innerHTML =
          '<button class="back-btn" onclick="showPlayer(\'' + esc(backTarget) + '\')">← ' + esc(backTarget) + '</button>' +
          '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">' +
            '<div style="padding:14px 16px;border-bottom:1px solid var(--border)">' +
              '<div style="font-size:16px;font-weight:700;margin-bottom:4px">' +
                (scan.type === 'hack' ? 'Hack Check' : 'Lang Check') + ' — ' + esc(scan.target_name) +
              '</div>' +
              '<div style="font-size:12px;color:var(--text2)">by ' + esc(scan.checker_name) + ' · ' + new Date(Number(scan.timestamp)).toLocaleString() + '</div>' +
              (scan.reason ? '<div style="font-size:12px;color:var(--text2);margin-top:2px">Reason: ' + esc(scan.reason) + '</div>' : '') +
            '</div>' +
            body +
          '</div>';
      } catch(e) {
        main.innerHTML = '<div class="empty-state"><p>Failed to load scan #' + id + '</p><p class="error-msg">' + esc(e.message) + '</p></div>';
      }
    }

    async function showPlayer(name) {
      addHistory(name);
      const main = document.getElementById('main-content');
      main.innerHTML = '<div class="loading">Loading ' + esc(name) + '...</div>';
      try {
        const data = await apiFetch('player/' + encodeURIComponent(name));
        const scans = data.scans || [];
        const uuid = data.uuid || name;

        const onlineBadge = data.online
          ? '<span class="online-badge"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span> Online</span>'
          : '<span class="offline-badge">Offline</span>';

        let runButtons = '';
        if (data.online) {
          runButtons =
            '<button class="run-btn" id="btn-hack" onclick="runScan(\'' + esc(name) + '\',\'hack\')">Run Hack Check</button>' +
            '<button class="run-btn" id="btn-lang" onclick="runScan(\'' + esc(name) + '\',\'lang\')">Run Lang Check</button>';
        }

        let cards = '';
        for (const s of scans) cards += buildScanCard(s);

        main.innerHTML =
          '<button class="back-btn" onclick="showHome()">← Home</button>' +
          '<div class="player-header">' +
            '<img src="' + headUrl(uuid) + '" onerror="this.src=\'' + headUrl(name) + '\'" width="64" height="64" alt="">' +
            '<div class="player-header-info"><h2>' + esc(name) + '</h2><p>' + esc(uuid) + '</p>' + onlineBadge + '</div>' +
          '</div>' +
          runButtons +
          '<div class="section-title">' + scans.length + ' Scan' + (scans.length !== 1 ? 's' : '') + '</div>' +
          '<div class="scan-cards">' + (cards || '<div class="empty-state"><p>No scans for this player yet.</p></div>') + '</div>';
      } catch(e) {
        main.innerHTML = '<div class="empty-state"><p>Failed to load player.</p><p class="error-msg">' + esc(e.message) + '</p></div>';
      }
    }

    async function runScan(name, type) {
      const btn = document.getElementById(type === 'hack' ? 'btn-hack' : 'btn-lang');
      if (btn) btn.disabled = true;
      try {
        await apiPost('scan/run', { player: name, type: type });
        showToast((type === 'hack' ? 'Hack check' : 'Lang check') + ' started on ' + name);
        setTimeout(() => showPlayer(name), 4000);
      } catch(e) {
        main.innerHTML = '<div class="empty-state"><p>Failed to run scan: ' + esc(e.message) + '</p></div>';
        if (btn) btn.disabled = false;
      }
    }

    async function loadRecentScans() {
      try {
        const scans = await apiFetch('scans?limit=30');
        const container = document.getElementById('recent-scans');
        if (!container) return;
        if (!scans || scans.length === 0) {
          container.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:12px;text-align:center">No scans yet</div>';
          return;
        }
        container.innerHTML = '';
        for (const s of scans) {
          const el = document.createElement('div');
          el.className = 'scan-item';
          el.onclick = () => showScan(s.id);
          el.innerHTML =
            '<div class="scan-item-top">' +
              '<span class="scan-item-name">' + esc(s.target_name) + '</span>' +
              '<span class="scan-item-time">' + timeAgo(s.timestamp) + '</span>' +
            '</div>' +
            '<div class="scan-item-meta">' + (s.type === 'hack' ? 'Hack' : 'Lang') + ' · by ' + esc(s.checker_name) + '</div>';
          container.appendChild(el);
        }
      } catch(e) {}
    }

    async function loadOnlinePlayers() {
      try {
        const players = await apiFetch('players/online');
        const container = document.getElementById('online-players');
        if (!container) return;
        if (!players || players.length === 0) {
          container.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:12px;text-align:center">No players online</div>';
          return;
        }
        container.innerHTML = '';
        for (const p of players) {
          const el = document.createElement('div');
          el.className = 'player-item';
          el.onclick = () => showPlayer(p.name);
          el.innerHTML =
            '<img src="' + headUrl(p.uuid) + '" onerror="this.src=\'' + headUrl(p.name) + '\'" alt="" width="28" height="28">' +
            '<span class="player-item-name">' + esc(p.name) + '</span>' +
            '<div class="online-dot"></div>';
          container.appendChild(el);
        }
      } catch(e) {}
    }

    function addHistory(name) {
      offlineHistory = [name, ...offlineHistory.filter(n => n !== name)].slice(0, 20);
      try { localStorage.setItem('ch_history', JSON.stringify(offlineHistory)); } catch(e) {}
      renderOfflineHistory();
    }

    function renderOfflineHistory() {
      const container = document.getElementById('offline-history');
      if (!container) return;
      if (offlineHistory.length === 0) {
        container.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:12px;text-align:center">Search a player above</div>';
        return;
      }
      container.innerHTML = '';
      for (const name of offlineHistory) {
        const el = document.createElement('div');
        el.className = 'player-item';
        el.onclick = () => showPlayer(name);
        el.innerHTML =
          '<img src="' + headUrl(name) + '" onerror="this.style.visibility=\'hidden\'" alt="" width="28" height="28">' +
          '<span class="player-item-name">' + esc(name) + '</span>';
        container.appendChild(el);
      }
    }

    function searchPlayer() {
      const name = document.getElementById('search-input').value.trim();
      if (!name) return;
      document.getElementById('search-input').value = '';
      showPlayer(name);
    }

    init();
</script>
</body>
</html>
