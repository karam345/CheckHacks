name: CheckHacks
version: 1.2.0
main: me.branduzzo.checkHacks.CheckHacksPlugin
api-version: '1.21'
description: Detects client-side hacks and mods via the Sign Translation Vulnerability.
authors: [branduzzo]

softdepend:
  - PlaceholderAPI
  - GrimAC
  - Vulcan
  - Spartan

commands:
  checkhacks:
    description: Check a player for installed hacks/mods.
    usage: /checkhacks <player> [hack1,hack2,...]
    permission: checkhacks.check
  chreload:
    description: Reload CheckHacks configuration.
    usage: /chreload
    permission: checkhacks.reload
  chalerts:
    description: Toggle hack detection alerts.
    usage: /chalerts
    permission: checkhacks.alerts
    aliases: [checkalerts, alerts]
  checklang:
    description: Check the language of a player.
    usage: /checklang <player> [lang1,lang2,...]
    permission: checkhacks.checklang
  cheditor:
    description: Open the CheckHacks web editor.
    usage: /cheditor
    permission: checkhacks.editor

permissions:
  checkhacks.check:
    description: Use /checkhacks.
    default: op
  checkhacks.reload:
    description: Use /chreload.
    default: op
  checkhacks.alerts:
    description: Receive alerts and use /chalerts.
    default: op
  checkhacks.checklang:
    description: Use /checklang.
    default: op
  checkhacks.editor:
    description: Use /cheditor.
    default: op
  checkhacks.*:
    description: All CheckHacks permissions.
    default: false
    children:
      checkhacks.check: true
      checkhacks.reload: true
      checkhacks.alerts: true
      checkhacks.checklang: true
      checkhacks.editor: true